          <h1 id="app-title" data-ui-label-key="app-title">Andrews Grammar</h1>

        <div class="hero-controls">
          <div class="ui-scale-control">
            <label class="ui-scale-label" for="ui-scale">Interface size</label>
            <div class="ui-scale-row">
              <input
                type="range"
                id="ui-scale"
                min="-6"
                max="6"

                value="0"
                aria-label="Interface size"
              />

            </div>
          </div>

            <span class="ui-density-label" id="ui-density-label" data-ui-label-key="ui-density-label">View</span>

              <button
                type="button"
                class="ui-density-button button-with-icon"
                id="ui-density-simple"
                data-ui-density="simple"
                data-ui-label-key="ui-density-simple"
                aria-pressed="true"
              >
                <span class="button-icon" aria-hidden="true">
                  <svg viewBox="0 0 16 16" focusable="false">
                    <rect x="3" y="3" width="10" height="10" rx="1.25"></rect>
                  </svg>
                </span>

                class="ui-density-button button-with-icon"
                id="ui-density-advanced"
                data-ui-density="advanced"
                data-ui-label-key="ui-density-advanced"
                aria-pressed="false"
              >
                <span class="button-icon" aria-hidden="true">
                  <svg viewBox="0 0 16 16" focusable="false">
                    <path d="M8 2.5 12.5 5v6L8 13.5 3.5 11V5z"></path>
                    <path d="M3.5 5 8 7.5 12.5 5"></path>

                  </svg>
                </span>
                <span class="button-label" data-ui-label-target>Advanced</span>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div
        id="classical-app-root"
        data-classical-shell-root="true"
        data-classical-shell="source-authority-result"
        data-classical-basal-authority="ANDREWS_TRANSCRIPTION_CANVAS.md"
